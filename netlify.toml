[build]
  command   = "npm run build"
  publish   = "dist"
[build.environment]
  NODE_VERSION = "20"
[functions]
  directory  = "netlify/functions"
  node_bundler = "esbuild"
[[redirects]]
  from = "/pesquisa.html"
  to   = "/pesquisa.html"
  status = 200
  force  = false

# Rota de reset de senha — deve ser SPA (index.html) para o hash token funcionar
[[redirects]]
  from = "/redefinir-senha"
  to   = "/index.html"
  status = 200
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
[[headers]]
  for = "/pesquisa.html"
  [headers.values]
    X-Frame-Options = ""
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
